<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="./img/icon/icon.PNG" type="image/x-icon">
    <title>VIUK</title>
    <link rel="stylesheet" href="../static/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="../static/fonts/PlayfairDisplay-VariableFont_wght.ttf" rel="stylesheet">
</head>
<body>
    <div class="cursor"></div>
    
    <header class="header">
        <nav class="nav-container">
            <!-- Enlace al inicio -->
            <a href="{{ url_for('home') }}" class="logo">VIUK</a>
            <ul class="nav-menu">
                <!-- Enlace a diseño -->
                <li>
                    <a href="{{ url_for('design') }}" class="nav-button">
                        <i class="fas fa-paint-brush"></i>
                        <span>Diseño</span>
                    </a>
                </li>
                <!-- Enlace a tienda -->
                <li>
                    <a href="{{ url_for('shop') }}" class="nav-button">
                        <i class="fas fa-store"></i>
                        <span>Tienda</span>
                    </a>
                </li>
                <!-- Enlace al carrito (puedes enlazar a una futura ruta Flask) -->
                <li>
                    <a href="{{ url_for('cart') }}" class="nav-button">
                        <i class="fas fa-shopping-cart"></i>
                        <span>Carrito</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>
    <main class="main-content">
        <div class="welcome-text">
            <h1>VIUK</h1>
            <p>Elegancia en cada detalle</p>
            <div class="decorative-line"></div>
        </div>
    </main>

    <div class="background-pattern"></div>

    <script src="../static/js/index.js"></script>
</body>
</html>
